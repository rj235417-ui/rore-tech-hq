# rore-tech-hq/eos/sync/manifest.conf
#
# Source of truth for which Tier 2 artifacts get propagated to which
# product project. Edited by hand; sourced by sync-to-project.sh.
#
# Format:
#   PRODUCT_<KEY>_NAME="Display name"
#   PRODUCT_<KEY>_REPO_HINT="Path or URL — for documentation only"
#   PRODUCT_<KEY>_TIER2=("artifact1" "artifact2" ...)
#
# The <KEY> is a short uppercase identifier matched against the
# --product flag or auto-detected from the target path.
#
# Tier 1 (HQ STANDARDS + ROUNDTABLE.md + Phase Protocol template +
# ADR template + Bug Report Prompt) propagates to every project
# regardless of manifest — handled in the script, not here.
#
# Tier 2 artifact names match filenames in eos/checklists/ and
# eos/runbooks/ (without the .md extension).
#
# Available Tier 2 artifacts:
#   FIREBASE_FLUTTER_SETUP    eos/checklists/FIREBASE_FLUTTER_SETUP.md
#   PLAY_STORE_SUBMISSION     eos/checklists/PLAY_STORE_SUBMISSION.md
#   EXTERNAL_DATA_IMPORTER    eos/checklists/EXTERNAL_DATA_IMPORTER.md
#   AI_PUBLISHING_PIPELINE    eos/checklists/AI_PUBLISHING_PIPELINE.md
#   SIGNING_KEY_BIRTH_CERTIFICATE  eos/checklists/SIGNING_KEY_BIRTH_CERTIFICATE.md
#   DEPLOYMENT_CHECKLISTS     eos/checklists/DEPLOYMENT_CHECKLISTS.md
#   LAUNCH_PLAN_TEMPLATE      eos/templates/LAUNCH_PLAN_TEMPLATE.md
#   SEO_TRIAGE                eos/runbooks/SEO_TRIAGE.md
#
# To add a new product: add a PRODUCT_<KEY>_* block below and append
# <KEY> to KNOWN_PRODUCTS at the bottom.

# ──────────────────────────────────────────────────────────────────
# VibeFire
# ──────────────────────────────────────────────────────────────────
PRODUCT_VIBEFIRE_NAME="VibeFire"
PRODUCT_VIBEFIRE_REPO_HINT="~/Desktop/vibefire"
PRODUCT_VIBEFIRE_TIER2=(
  "FIREBASE_FLUTTER_SETUP"
  "PLAY_STORE_SUBMISSION"
  "SIGNING_KEY_BIRTH_CERTIFICATE"
  "LAUNCH_PLAN_TEMPLATE"
)

