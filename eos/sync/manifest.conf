# ──────────────────────────────────────────────────────────────────
# Path-to-product auto-detection
# ──────────────────────────────────────────────────────────────────
# The script can infer which product is being synced from the target
# path. Substrings matched case-insensitively against the absolute
# target path. First match wins. Override with --product KEY.
PATH_HINT_VIBEFIRE="vibefire"
PATH_HINT_SECURITY_SPY="security-spy securityspy"
PATH_HINT_VIBE_SPINNER="vibe-spinner vibespinner vibespin"
